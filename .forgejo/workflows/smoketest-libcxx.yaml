name: Smoke Tests (libc++)

on:
  workflow_dispatch:
  push:
    branches:
      - 'libc\+\+-build'
      - 'libc\+\+-build-threads'

jobs:
  test-libcxx:
    strategy:
      fail-fast: true
      matrix:
        kasan:
          - {
              name: "Without Address Sanitizer",
              kasan_opt: ""
            }
          - {
              name: "With Address Sanitizer",
              kasan_opt: "--kasan"
            }

        config:
          - {
              name: "host-x64-target-arm",
              runs-on: docker,
              container: "codeberg.org/larchcone/ci/node-circle-stdlib:gcc15-v3",
              prefix: "arm-none-eabi-",
              circle-machine: "1",
              qemu-bin: "qemu-system-arm",
              qemu-machine: "raspi0",
              qemu-kernel-opt: "-bios",
              qemu-img: "kernel.img",
            }
          - {
              name: "host-x64-target-aarch64",
              runs-on: docker,
              container: "codeberg.org/larchcone/ci/node-circle-stdlib:gcc15-v3",
              prefix: "aarch64-none-elf-",
              circle-machine: "3",
              qemu-bin: "qemu-system-aarch64",
              qemu-machine: "raspi3b",
              qemu-kernel-opt: "-kernel",
              qemu-img: "kernel8.img",
            }
          - {
              name: "host-aarch64-target-arm",
              runs-on: ubuntu-arm-22.04,
              container: "codeberg.org/larchcone/ci/node-circle-stdlib-aarch64:gcc15-v1",
              prefix: "arm-none-eabi-",
              circle-machine: "1",
              qemu-bin: "qemu-system-arm",
              qemu-machine: "raspi0",
              qemu-kernel-opt: "-bios",
              qemu-img: "kernel.img",
            }
          - {
              name: "host-aarch64-target-aarch64",
              runs-on: ubuntu-arm-22.04,
              container: "codeberg.org/larchcone/ci/node-circle-stdlib-aarch64:gcc15-v1",
              prefix: "aarch64-none-elf-",
              circle-machine: "3",
              qemu-bin: "qemu-system-aarch64",
              qemu-machine: "raspi3b",
              qemu-kernel-opt: "-kernel",
              qemu-img: "kernel8.img",
            }

    name: ${{ matrix.config.name }} - With libc++ - ${{ matrix.kasan.name }}

    # Run KASan tests only on the AArch64 hosts. This saves a lot of time, and KASan
    # is not expected to have different results on x64 hosts since it's a userspace-only sanitizer.
    if: matrix.kasan.kasan_opt == '' || matrix.config['runs-on'] == 'ubuntu-arm-22.04'

    runs-on: ${{ matrix.config.runs-on }}

    container:
      image: ${{ matrix.config.container }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup environment variables from matrix
        run: |
          echo "CFG_QEMU_BIN=${{ matrix.config.qemu-bin }}" >> $GITHUB_ENV
          echo "CFG_QEMU_MACHINE=${{ matrix.config.qemu-machine }}" >> $GITHUB_ENV
          echo "CFG_QEMU_OPT=${{ matrix.config.qemu-kernel-opt }}" >> $GITHUB_ENV
          echo "CFG_QEMU_IMG=${{ matrix.config.qemu-img }}" >> $GITHUB_ENV

      - name: Configure circle-stdlib with QEMU support and libc++
        run: |
          ./configure -p ${{ matrix.config.prefix }} -r ${{ matrix.config.circle-machine }} --qemu --libcxx ${{ matrix.kasan.kasan_opt }}

      - name: Build libraries
        run: make -j$(nproc)

      - name: Build samples
        run: make build-samples

      - name: Build test library
        run: |
          make -C tests/lib

      - name: Run smoke test with QEMU
        run: |
          cd samples/05-smoketest
          ../../testdata/setup-sd.sh
          ulimit -t 300
          ${{ matrix.config.qemu-bin }} -M ${{ matrix.config.qemu-machine }} ${{ matrix.config.qemu-kernel-opt }} ${{ matrix.config.qemu-img }} -display none -nographic -semihosting -sd sdcard.img

      - name: Run libc++ concurrency test
        run: |
          cd tests/05-libcxx-concurrency
          ./run_test.sh
