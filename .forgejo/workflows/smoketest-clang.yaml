name: Smoke Tests (clang)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - develop
      - clang-build

jobs:
  test-clang:
    defaults:
        run:
          shell: bash -x {0}  # applies set -x to every run: step
    strategy:
      fail-fast: true
      matrix:
        kasan:
          - { name: "Without Address Sanitizer", kasan_opt: "" }
          - { name: "With Address Sanitizer", kasan_opt: "--kasan" }

        config:
          - {
              name: "host-x64-target-arm",
              runs-on: docker,
              container: "codeberg.org/larchcone/ci/node-circle-stdlib:clang22-v2",
              aarch64-opt: "",
              circle-machine: "1",
              qemu-bin: "qemu-system-arm",
              qemu-machine: "raspi0",
              qemu-kernel-opt: "-bios",
              qemu-img: "kernel.img",
            }
          - {
              name: "host-x64-target-aarch64",
              runs-on: docker,
              container: "codeberg.org/larchcone/ci/node-circle-stdlib:clang22-v2",
              aarch64-opt: "--aarch64",
              circle-machine: "3",
              qemu-bin: "qemu-system-aarch64",
              qemu-machine: "raspi3b",
              qemu-kernel-opt: "-kernel",
              qemu-img: "kernel8.img",
            }
          - {
              name: "host-aarch64-target-arm",
              runs-on: ubuntu-arm-22.04,
              container: "codeberg.org/larchcone/ci/node-circle-stdlib-aarch64:clang22-v2",
              aarch64-opt: "",
              circle-machine: "1",
              qemu-bin: "qemu-system-arm",
              qemu-machine: "raspi0",
              qemu-kernel-opt: "-bios",
              qemu-img: "kernel.img",
            }
          - {
              name: "host-aarch64-target-aarch64",
              runs-on: ubuntu-arm-22.04,
              container: "codeberg.org/larchcone/ci/node-circle-stdlib-aarch64:clang22-v2",
              aarch64-opt: "--aarch64",
              circle-machine: "3",
              qemu-bin: "qemu-system-aarch64",
              qemu-machine: "raspi3b",
              qemu-kernel-opt: "-kernel",
              qemu-img: "kernel8.img",
            }

    name: ${{ matrix.config.name }} - With clang/libc++ - ${{ matrix.kasan.name }}

    runs-on: ${{ matrix.config.runs-on }}

    container:
      image: ${{ matrix.config.container }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup environment variables from matrix
        run: |
          echo "CFG_QEMU_BIN=${{ matrix.config.qemu-bin }}" >> $GITHUB_ENV
          echo "CFG_QEMU_MACHINE=${{ matrix.config.qemu-machine }}" >> $GITHUB_ENV
          echo "CFG_QEMU_OPT=${{ matrix.config.qemu-kernel-opt }}" >> $GITHUB_ENV
          echo "CFG_QEMU_IMG=${{ matrix.config.qemu-img }}" >> $GITHUB_ENV

      - name: Configure circle-stdlib with QEMU support and clang/libc++
        run: |
          ./configure --clang ${{ matrix.config.aarch64-opt }} -r ${{ matrix.config.circle-machine }} --qemu --libcxx ${{ matrix.kasan.kasan_opt }} --kernel-max-size 8

      - name: Build libraries
        run: make -j$(nproc)

      - name: Build samples
        run: make build-samples

      - name: Run smoke test with QEMU
        run: |
          cd samples/05-smoketest
          ../../testdata/setup-sd.sh
          ulimit -t 300
          ${{ matrix.config.qemu-bin }} -M ${{ matrix.config.qemu-machine }} ${{ matrix.config.qemu-kernel-opt }} ${{ matrix.config.qemu-img }} -display none -nographic -semihosting -sd sdcard.img

      - name: Build test library
        run: |
          make -C tests/lib

      - name: Run basic socket test
        run: |
          cd tests/01-basic-socket
          ./run_test.sh

      - name: Run basic select/poll socket test
        run: |
          cd tests/02-basic-socket-mux
          ./run_test.sh

      - name: Run pipe test
        run: |
          cd tests/03-pipe
          ./run_test.sh

      - name: Run netdb test
        run: |
          cd tests/04-netdb
          ./run_test.sh

      - name: Run libc++ concurrency test
        run: |
          cd tests/05-libcxx-concurrency
          ./run_test.sh

      - name: Run std::filesystem test
        run: |
          cd tests/06-filesystem
          ./run_test.sh
